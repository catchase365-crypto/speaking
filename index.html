<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChronosNex - 英语口语高精双轴调谐训练舱</title>
    <style>
        :root {
            /* 调谐盘配色 */
            --glass-bg: rgba(22, 27, 34, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --left-cyan: #00f0ff;
            --left-gold: #ffdf00;
            --right-magenta: #00ffaa;
            --right-violet: #bd00ff;
            
            /* 流光底色 */
            --flow-cyan: #06b6d4;
            --flow-emerald: #10b981;
            --flow-violet: #8b5cf6;
            --flow-magenta: #ec4899;
            --flow-yellow: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            color: #e6edf3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            background: #0d1117;
            overflow: hidden;
            position: relative;
            padding: 20px 10px;
        }

        /* 全局程序坞容器挂载底座 */
        .dock-global-bar {
            position: fixed;
            bottom: 32px;
            left: 20px;
            right: 20px;
            max-width: 760px;
            margin: 0 auto;
            background: rgba(22, 27, 34, 0.4); /* 大幅降低不透明度，拥抱纯净穿透感 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 10px;
            display: flex;
            gap: 8px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            z-index: 999;
            pointer-events: auto;
        }

        .dock-btn {
            flex: 1;
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .dock-btn:hover { transform: translateY(0); box-shadow: 0 6px 15px rgba(0,0,0,0.4); }
        .dock-btn-slow { background: rgba(139, 92, 246, 0.15); border-color: #8b5cf6; }
        .dock-btn-slow:hover { background: #8b5cf6; box-shadow: 0 0 12px rgba(139, 92, 246, 0.5); }
        .dock-btn-normal { background: rgba(16, 185, 129, 0.15); border-color: #10b981; }
        .dock-btn-normal:hover { background: #10b981; box-shadow: 0 0 12px rgba(16, 185, 129, 0.5); }
        .dock-btn-fast { background: rgba(236, 72, 153, 0.15); border-color: #ec4899; }
        .dock-btn-fast:hover { background: #ec4899; box-shadow: 0 0 12px rgba(236, 72, 153, 0.5); }

        /* 1. 静态流体背景 */
        .fluid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #161b22, #0d1117);
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
        }
        .c-emerald  { top: -10%; left: -10%; width: max(40vw, 40vh); height: max(40vw, 40vh); background: var(--flow-emerald); }
        .c-violet   { top: -10%; right: -10%; width: max(45vw, 45vh); height: max(45vw, 45vh); background: var(--flow-violet); }
        .c-seablue  { bottom: -10%; left: -10%; width: max(50vw, 50vh); height: max(50vw, 50vh); background: var(--flow-cyan); }
        .c-magenta  { bottom: -10%; right: -10%; width: max(40vw, 40vh); height: max(40vw, 40vh); background: var(--flow-magenta); }
        .c-yellow   { top: 40%; left: 40%; width: max(35vw, 35vh); height: max(35vw, 35vh); background: var(--flow-yellow); }

        /* 2. 核心磨砂玻璃主容器 */
        .glass-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 25px 25px 0 25px;
            background: rgba(22, 27, 34, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
            height: calc(100dvh - 40px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--flow-cyan), var(--flow-emerald));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        /* 3. 本地大礼包导入舱 */
        .pack-uploader-zone {
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(6, 182, 212, 0.3);
            border-radius: 14px;
            text-align: center;
        }

        .pack-uploader-zone span {
            font-size: 0.85rem;
            color: #8b949e;
            display: block;
            margin-bottom: 10px;
        }

        /* 4. 双轴高精调谐选择器区域 */
        .dual-wheel-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            width: 100%;
            margin-bottom: 25px;
        }

        .wheel-card-frame {
            position: relative;
            flex: 1;
            aspect-ratio: 1 / 1;
            max-width: 155px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        .wheel-touch-zone {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            touch-action: none;
        }
        .wheel-touch-zone:active {
            cursor: grabbing;
        }

        .center-needle {
            position: absolute;
            top: 6px;
            width: 3px;
            height: 12px;
            border-radius: 1.5px;
            z-index: 10;
            pointer-events: none;
        }
        .left-frame .center-needle {
            background: var(--left-cyan);
            box-shadow: 0 0 8px var(--left-cyan);
        }
        .right-frame .center-needle {
            background: var(--right-magenta);
            box-shadow: 0 0 8px var(--right-magenta);
        }

        .wheel-svg-viewport {
            width: 88%;
            height: 88%;
            overflow: visible;
        }

        .dial-text-node {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 900;
            font-size: 20px;
            fill: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 10px rgba(0,0,0,0.9);
            text-anchor: middle;
            dominant-baseline: middle;
            transition: fill 0.1s, font-size 0.1s, opacity 0.1s;
        }
        
        /* 刻度组默认调暗模糊置于底层结构 */
        #leftTickGroup, #rightTickGroup {
            opacity: 0.15;
            filter: blur(1.5px);
            transition: opacity 0.4s, filter 0.4s;
        }

        .center-hud-mesh-bg {
            fill: url(#fishnetPattern);
            pointer-events: none;
        }

        .left-frame .dial-text-node.active {
            fill: rgba(255, 255, 255, 0.3);
            font-size: 24px;
            font-weight: 900;
            transition: fill 0.4s, filter 0.4s;
        }
        .right-frame .dial-text-node.active {
            fill: rgba(255, 255, 255, 0.3);
            font-size: 24px;
            font-weight: 900;
            transition: fill 0.4s, filter 0.4s;
        }

        /* 触摸激活态：解除模糊、注入能量强光、网格复苏 */
        .wheel-card-frame.is-active-tuning .cyber-eye-mesh {
            opacity: 0.7;
        }
        .wheel-card-frame.is-active-tuning .cyber-eye-outline {
            opacity: 0.9;
            filter: drop-shadow(0 0 10px var(--left-cyan));
        }
        .wheel-card-frame.right-frame.is-active-tuning .cyber-eye-outline {
            filter: drop-shadow(0 0 10px var(--right-magenta));
        }
        .wheel-card-frame.is-active-tuning #leftTickGroup,
        .wheel-card-frame.is-active-tuning #rightTickGroup {
            opacity: 0.7;
            filter: blur(0px);
        }
        .wheel-card-frame.left-frame.is-active-tuning .dial-text-node.active {
            fill: #ffffff;
            filter: drop-shadow(0 0 12px var(--left-cyan));
        }
        .wheel-card-frame.right-frame.is-active-tuning .dial-text-node.active {
            fill: #ffffff;
            filter: drop-shadow(0 0 12px var(--right-magenta));
        }

        .center-hud-readout {
            position: absolute;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 36px;
            color: #ffffff;
            pointer-events: none;
            z-index: 2;
            line-height: 1;
        }
        .left-frame .center-hud-readout { text-shadow: 0 0 12px rgba(0, 240, 255, 0.25); }
        .right-frame .center-hud-readout { text-shadow: 0 0 12px rgba(189, 0, 255, 0.25); }

        /* 赛博视网膜与性感丝袜眼廓 */
        .cyber-eye-mesh {
            fill: url(#fishnetPattern);
            transition: d 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.4s;
            pointer-events: none;
            opacity: 0.12; /* 默认大幅调暗 */
        }
        .cyber-eye-shadow {
            fill: url(#sphereGrad);
            transition: d 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            pointer-events: none;
        }
        .cyber-eye-outline {
            fill: none;
            stroke-width: 2;
            stroke-dasharray: 6 3;
            opacity: 0.15; /* 默认大幅调暗 */
            transition: d 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.4s, filter 0.4s;
            pointer-events: none;
            filter: blur(2px); /* 默认静止状态加入高速模糊 */
        }
        .left-frame .cyber-eye-outline {
            stroke: var(--left-cyan);
        }
        .right-frame .cyber-eye-outline {
            stroke: var(--right-magenta);
        }
        /* 柔和媚眼闭合动画关键帧 */
        .is-blinking .cyber-eye-mesh,
        .is-blinking .cyber-eye-shadow,
        .is-blinking .cyber-eye-outline {
            d: path("M 12,100 Q 100,98 188,100 Q 100,102 12,100 Z") !important;
        }
        .is-blinking .cyber-eye-pupil {
            transform: scaleY(0);
        }

        /* 5. 动态大关卡主题看板 */
        .theme-display-panel {
            text-align: center;
            padding: 8px 12px;
            background: rgba(6, 182, 212, 0.06);
            border: 1px dashed rgba(6, 182, 212, 0.3);
            border-radius: 14px;
            margin-bottom: 12px;
            backdrop-filter: blur(5px);
            width: 100%;
            align-self: center;
        }
        .theme-display-panel h2 {
            font-size: 0.95rem;
            color: #ffffff;
            font-weight: bold;
            line-height: 1.3;
        }
        .theme-display-panel .task-indicator {
            font-size: 0.85rem;
            color: var(--flow-emerald);
            margin-top: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        #training-board {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0.9);
            transform-origin: top center;
        }

        /* 6. 流式发音主画板卡片 */
        .sentence-card {
            background: transparent;
            border-radius: 0;
            padding: 0;
            border: none;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-scroll-body {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 110px;
            scrollbar-width: none;
        }
        .card-scroll-body::-webkit-scrollbar { display: none; }

        .interactive-flow-zone {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end; 
            row-gap: 34px;
            column-gap: 6px;
            margin-bottom: 25px;
            padding: 10px 0px;
            width: 100%;
        }

        .word-column {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .pronunciation-tip {
            font-size: 0.75rem;
            color: var(--flow-yellow);
            text-align: center;
            white-space: nowrap;
            margin-bottom: 8px;
            background: rgba(245, 158, 11, 0.1);
            padding: 1px 5px;
            border-radius: 4px;
            border: 1px solid rgba(245, 158, 11, 0.2);
            pointer-events: none;
        }

        .word-text {
            font-size: 1.35rem;
            letter-spacing: 0.5px;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            color: #c9d1d9;
            display: inline-flex !important;
            flex-direction: row !important;
            position: relative;
        }

        .word-text:hover, .word-text.active-word {
            background: rgba(6, 182, 212, 0.2);
            color: #fff;
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.4);
        }

        .stress { color: #ffffff; font-weight: 700; }
        .reduction { color: #e6edf3; opacity: 0.3; font-size: 1.2rem; }

        .letter-chunk { position: relative; display: inline-block; }

        .letter-chunk.chunk-primary::after {
            content: "▲";
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: var(--flow-yellow);
            text-shadow: 0 0 6px rgba(245, 158, 11, 0.6);
            pointer-events: none;
        }

        .letter-chunk.chunk-secondary::after {
            content: "▲";
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            color: var(--flow-cyan);
            opacity: 0.7;
            pointer-events: none;
        }

        .link-next::after {
            content: "‿";
            position: absolute;
            right: -6px;
            bottom: -6px;
            color: var(--flow-cyan);
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 2;
            pointer-events: none;
        }

        .pause-container {
            display: inline-flex;
            align-items: center;
            height: 100%;
            align-self: flex-end;
            padding-bottom: 4px;
        }
        .pause-short { margin: 0 5px 0 2px; color: var(--flow-violet); font-weight: bold; font-size: 1.2rem; }
        .pause-long { margin: 0 10px 0 4px; color: var(--flow-magenta); font-weight: bold; font-size: 1.2rem; border-right: 2px dashed rgba(236, 72, 153, 0.4); padding-right: 4px; }

        /* 7. 发音检视面板舱 */
        .inspector-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(88, 166, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .inspector-hidden { display: none !important; }
        .inspector-left { flex: 1; }
        .inspector-word { font-size: 1.25rem; font-weight: bold; color: #58a6ff; margin-bottom: 4px; }
        .inspector-ipa { font-family: "Lucida Sans Unicode", sans-serif; font-size: 1.05rem; color: var(--flow-emerald); background: rgba(16, 185, 129, 0.1); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
        .inspector-desc { font-size: 0.85rem; color: #8b949e; line-height: 1.4; }

        .translation-zone { font-size: 0.95rem; color: #8b949e; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; line-height: 1.5; }

        /* 原按钮控制台弃用，移至全局程序坞 */
        .control-panel { display: none !important; }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
            z-index: 5;
        }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: var(--flow-cyan); }
        .nav-btn:active { transform: scale(1.0); }

        .empty-notice {
            text-align: center;
            padding: 30px;
            color: #8b949e;
            background: rgba(255,255,255,0.01);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }

        /* 移动端细致优化 */
        @media (max-width: 600px) {
            body { padding: 0; background: #0d1117; }
            .glass-container {
                padding: 15px 5px 0 5px;
                border-radius: 0;
                border: none;
                height: 100dvh;
                background: transparent;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                box-shadow: none;
            }
            h1 { font-size: 1.2rem; margin-bottom: 15px; }
            .dual-wheel-row { gap: 12px; margin-bottom: 15px; }
            .wheel-card-frame { max-width: 125px; border-radius: 18px; }
            .center-hud-readout { font-size: 28px; }
            .theme-display-panel { margin-bottom: 12px; padding: 6px 8px; width: 100%; }
            .theme-display-panel h2 { font-size: 0.85rem; line-height: 1.2; }
            .word-text { font-size: 1.15rem; padding: 1px 3px; }
            .interactive-flow-zone { row-gap: 26px; column-gap: 4px; }
            .pronunciation-tip { font-size: 0.65rem; }
            .inspector-panel { flex-direction: column; align-items: flex-start; gap: 6px; padding: 10px; }
            .dock-global-bar { bottom: 12px; left: 12px; right: 12px; padding: 8px; gap: 6px; border-radius: 16px; }
            .dock-btn { font-size: 1.3rem; border-radius: 10px; }
            .card-scroll-body { padding-bottom: 85px; }
        }
    </style>
</head>
<body>

    <div class="fluid-bg">
        <div class="circle c-emerald"></div>
        <div class="circle c-violet"></div>
        <div class="circle c-seablue"></div>
        <div class="circle c-magenta"></div>
        <div class="circle c-yellow"></div>
    </div>

    
    <div class="dock-global-bar" id="globalDockBar"></div>

    <div class="glass-container">
        
        <div class="dual-wheel-row">
            <button class="nav-btn" onclick="navigateLevel(-1)">◁</button>
            <div class="wheel-card-frame left-frame">
                <div class="center-needle"></div>
                <div class="center-hud-readout" id="leftReadout">1</div>
                <div class="wheel-touch-zone" id="leftTouchZone">
                    <svg class="wheel-svg-viewport" viewBox="0 0 200 200">
                        <defs>
                            <pattern id="fishnetPattern" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                                <path d="M 0,0 L 0,12 M 0,0 L 12,0" stroke="rgba(255,255,255,0.2)" stroke-width="0.75" />
                                <circle cx="6" cy="6" r="1.5" fill="rgba(255,255,255,0.15)" />
                            </pattern>
                            <radialGradient id="sphereGrad" cx="50%" cy="50%" r="50%">
                                <stop offset="60%" stop-color="transparent" />
                                <stop offset="100%" stop-color="rgba(13,17,23,0.95)" />
                            </radialGradient>
                        </defs>
                        
                        <path class="cyber-eye-shadow" d="M 12,100 Q 100,15 188,100 Q 100,185 12,100 Z" />
                        <circle class="cyber-eye-pupil" cx="100" cy="100" r="42" fill="#0d1117" stroke="var(--left-cyan)" stroke-width="1.5" style="pointer-events: none; transition: transform 0.3s; transform-origin: 100px 100px;" />
                        <g id="leftTickGroup" style="transform-origin: 100px 100px; will-change: transform;"></g>
                        <g id="leftTextGroup"></g>
                        
                        <path class="cyber-eye-mesh" d="M 12,100 Q 100,15 188,100 Q 100,185 12,100 Z" />
                        <path class="cyber-eye-outline left-outline" d="M 12,100 Q 100,15 188,100 Q 100,185 12,100 Z" />
                    </svg>
                </div>
            </div>

            <div class="wheel-card-frame right-frame">
                <div class="center-needle"></div>
                <div class="center-hud-readout" id="rightReadout">1</div>
                <div class="wheel-touch-zone" id="rightTouchZone">
                    <svg class="wheel-svg-viewport" viewBox="0 0 200 200">
                        <path class="cyber-eye-shadow" d="M 12,100 Q 100,15 188,100 Q 100,185 12,100 Z" />
                        <circle class="cyber-eye-pupil" cx="100" cy="100" r="42" fill="#0d1117" stroke="var(--right-magenta)" stroke-width="1.5" style="pointer-events: none; transition: transform 0.3s; transform-origin: 100px 100px;" />
                        <g id="rightTickGroup" style="transform-origin: 100px 100px; will-change: transform;"></g>
                        <g id="rightTextGroup"></g>
                        <path class="cyber-eye-mesh" d="M 12,100 Q 100,15 188,100 Q 100,185 12,100 Z" />
                        <path class="cyber-eye-outline right-outline" d="M 12,100 Q 100,15 188,100 Q 100,185 12,100 Z" />
                    </svg>
                </div>
            </div>
            <button class="nav-btn" onclick="navigateLevel(1)">▷</button>
        </div>

        <div class="theme-display-panel" id="themeDisplayPanel" style="position: relative; overflow: hidden;">
            <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;" xmlns="http://www.w3.org/2000/svg">
                <rect width="100%" height="100%" class="center-hud-mesh-bg" />
            </svg>
            <h2 id="theme-title" style="position: relative; z-index: 1;">未载入数据</h2>
        </div>

        <div id="training-board"></div>
    </div>

    <script>
        // 1. 系统破冰保底演示数据
        const defaultData = [
            {
                "id": 1,

        // 2. IndexedDB 异步管理仓
        const DB_NAME = "ChronosNexDB";
        const STORE_NAME = "PackStore";
        const KEY_NAME = "oral_pack_data";
        let db = null;

        function initIndexedDB(callback) {
            try {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    callback();
                };
                request.onerror = (e) => {
                    console.error("IndexedDB 初始化失败，切换为纯内存运行模式", e);
                    callback();
                };
            } catch (err) {
                console.error("当前环境不支持 IndexedDB，切换为纯内存模式", err);
                callback();
            }
        }

        function loadPackFromDB() {
            if (!db) {
                fetchLocalPack();
                return;
            }
            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.get(KEY_NAME);
            request.onsuccess = (e) => {
                if (e.target.result) {
                    globalIndexData = e.target.result;
                    console.log(`⚡ 已从本地缓存潜行恢复 ${globalIndexData.length} 个核心关卡`);
                    leftWheel.setValue(currentLevel);
                    rightWheel.setValue(currentTask);
                    updateSelectedCard();
                } else {
                    fetchLocalPack();
                }
            };
            request.onerror = () => { fetchLocalPack(); };
        }

        async function fetchLocalPack() {
            console.log("📅 正在自动向云端拉取全量大礼包数据...");
            try {
                const response = await fetch('data/1.json');
                if (!response.ok) throw new Error(`HTTP 异常! 状态码: ${response.status}`);
                const data = await response.json();
                if (!Array.isArray(data)) throw new Error("解包失败：根节点非合规数组结构");
                
                globalIndexData = data;
                savePackToDB(data);
                leftWheel.setValue(currentLevel);
                rightWheel.setValue(currentTask);
                console.log(`✅ 成功自动同步并缓存全量 ${data.length} 个训练卡片`);
                updateSelectedCard();
            } catch (err) {
                console.error("无感拉取 data/1.json 失败，启用保底策略:", err);
                updateSelectedCard();
            }
        }

        function savePackToDB(data) {
            if (!db) return;
            try {
                const transaction = db.transaction([STORE_NAME], "readwrite");
                const store = transaction.objectStore(STORE_NAME);
                store.put(data, KEY_NAME);
            } catch (err) {
                console.error("写入 IndexedDB 出错", err);
            }
        }

        // 3. 双轴高精调谐引擎
        class TuningWheelEngine {
            constructor(config) {
                this.container = config.container;
                this.tickGroup = config.tickGroup;
                this.textGroup = config.textGroup;
                this.readout = config.readout;
                
                this.isInfinite = config.isInfinite;
                this.totalSlots = config.totalSlots;
                this.degreesPerSlot = 360 / this.totalSlots;
                this.minVal = config.minVal;
                this.maxVal = config.maxVal;
                this.baseVal = config.baseVal;
                this.radius = 74; 
                this.themeColor = config.themeColor;
                this.subColor = config.subColor;
                this.onValueChange = config.onValueChange;
                this.updateOnDrag = config.updateOnDrag !== undefined ? config.updateOnDrag : true;

                this.currentAngle = 0; 
                this.isDragging = false;
                this.velocity = 0;
                this.lastAngleDeg = 0;
                this.lastTime = 0;
                this.friction = 0.94;
                this.animationFrameId = null;
                this.lastReportedValue = null;

                this.initStructure();
                this.render();
            }

            initStructure() {
                for (let a = 0; a < 360; a += 3) {
                    const isMajor = (a % this.degreesPerSlot === 0);
                    if(!this.isInfinite) {
                        const totalArc = (this.maxVal - this.minVal) * this.degreesPerSlot;
                        if(a > totalArc && a < 360) continue;
                    }
                    const rStart = isMajor ? 86 : 91;
                    const rEnd = 97;
                    const rad = (a * Math.PI) / 180;
                    
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", 100 + rStart * Math.sin(rad));
                    line.setAttribute("y1", 100 - rStart * Math.cos(rad));
                    line.setAttribute("x2", 100 + rEnd * Math.sin(rad));
                    line.setAttribute("y2", 100 - rEnd * Math.cos(rad));
                    line.setAttribute("stroke", isMajor ? this.themeColor : this.subColor);
                    line.setAttribute("stroke-width", isMajor ? "1.5" : "1");
                    this.tickGroup.appendChild(line);
                }

                for (let i = 0; i < this.totalSlots; i++) {
                    const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    textNode.setAttribute("class", "dial-text-node");
                    textNode.style.cursor = "pointer";
                    // 允许直接点击数字切换
                    textNode.addEventListener('click', (e) => {
                        const targetVal = parseInt(e.target.textContent);
                        if(!isNaN(targetVal)) this.setValue(targetVal);
                    });
                    this.textGroup.appendChild(textNode);
                }
            }

            getInteractionAngle(clientX, clientY) {
                const rect = this.container.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                return Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
            }

            render() {
                if (!this.isInfinite) {
                    const maxAllowedAngle = 0;
                    const minAllowedAngle = -(this.maxVal - this.minVal) * this.degreesPerSlot;
                    if (this.currentAngle > maxAllowedAngle) { this.currentAngle = maxAllowedAngle; this.velocity = 0; }
                    if (this.currentAngle < minAllowedAngle) { this.currentAngle = minAllowedAngle; this.velocity = 0; }
                }

                this.tickGroup.style.transform = `rotate(${this.currentAngle}deg)`;

                const continuousValue = this.baseVal - (this.currentAngle / this.degreesPerSlot);
                const centerValueInt = Math.round(continuousValue);

                const textNodes = this.textGroup.children;
                for (let i = 0; i < this.totalSlots; i++) {
                    const slotWorldAngle = i * this.degreesPerSlot + this.currentAngle;
                    const rad = (slotWorldAngle * Math.PI) / 180;

                    const x = 100 + this.radius * Math.sin(rad);
                    const y = 100 - this.radius * Math.cos(rad);

                    const node = textNodes[i];
                    node.setAttribute("x", x);
                    node.setAttribute("y", y);

                    const angleDiff = ((slotWorldAngle + 180) % 360 + 360) % 360 - 180;
                    const stepsFromTop = Math.round(angleDiff / this.degreesPerSlot);

                    let slotValue = centerValueInt + stepsFromTop;
                    slotValue = ((slotValue - this.minVal) % (this.maxVal - this.minVal + 1) + (this.maxVal - this.minVal + 1)) % (this.maxVal - this.minVal + 1) + this.minVal;
                    
                    if (this.isInfinite) {
                        node.style.opacity = Math.abs(stepsFromTop) > 5 ? 0.2 : (stepsFromTop === 0 ? 1 : Math.max(0.4, 1 - Math.abs(stepsFromTop) * 0.15));
                    } else {
                        node.style.opacity = Math.abs(stepsFromTop) > 5 ? 0 : (stepsFromTop === 0 ? 1 : Math.max(0.12, 1 - Math.abs(stepsFromTop) * 0.18));
                    }

                    node.textContent = slotValue;

                    if (stepsFromTop === 0 && node.style.opacity !== "0") {
                        if (!node.classList.contains('active')) {
                            node.classList.add('active');
                            this.readout.textContent = slotValue;
                            if (slotValue !== this.lastReportedValue) {
                                this.lastReportedValue = slotValue;
                                triggerHaptic();
                                if (this.updateOnDrag || !this.isDragging) {
                                    this.onValueChange(slotValue);
                                }
                            }
                        }
                    } else {
                        node.classList.remove('active');
                    }
                }
            }

            snapToClosestTick() {
                const targetAngle = Math.round(this.currentAngle / this.degreesPerSlot) * this.degreesPerSlot;
                const startAn = this.currentAngle;
                const diff = targetAngle - startAn;
                let frame = 0;
                const totalFrames = 14;

                const springLoop = () => {
                    frame++;
                    const progress = frame / totalFrames;
                    const easeOutBack = 1 - Math.pow(1 - progress, 3); 
                    this.currentAngle = startAn + diff * easeOutBack;
                    this.render();

                    if (frame < totalFrames) {
                        this.animationFrameId = requestAnimationFrame(springLoop);
                    } else {
                        this.currentAngle = targetAngle;
                        this.render();
                    }
                };
                this.animationFrameId = requestAnimationFrame(springLoop);
            }

            setValue(val) {
                if (this.animationFrameId) cancelAnimationFrame(this.animationFrameId);
                const targetAngle = (this.baseVal - val) * this.degreesPerSlot;
                this.currentAngle = targetAngle;
                this.render();
                this.onValueChange(val);
            }

            start(e) {
                this.isDragging = true;
                this.velocity = 0;
                if (this.animationFrameId) cancelAnimationFrame(this.animationFrameId);

                const pageX = e.touches ? e.touches[0].clientX : e.clientX;
                const pageY = e.touches ? e.touches[0].clientY : e.clientY;

                this.lastInteractionAngle = this.getInteractionAngle(pageX, pageY);
                this.lastAngleDeg = this.currentAngle;
                this.lastTime = Date.now();
            }

            move(e) {
                if (!this.isDragging) return;

                const pageX = e.touches ? e.touches[0].clientX : e.clientX;
                const pageY = e.touches ? e.touches[0].clientY : e.clientY;

                const currentInteractionAngle = this.getInteractionAngle(pageX, pageY);
                let angleDelta = currentInteractionAngle - this.lastInteractionAngle;

                if (angleDelta > 180) angleDelta -= 360;
                if (angleDelta < -180) angleDelta += 360;

                this.currentAngle += angleDelta;
                this.lastInteractionAngle = currentInteractionAngle;

                const now = Date.now();
                const timeDiff = now - this.lastTime;
                if (timeDiff > 0) {
                    this.velocity = (this.currentAngle - this.lastAngleDeg) / timeDiff;
                    this.lastAngleDeg = this.currentAngle;
                    this.lastTime = now;
                }
                this.render();
            }

            end() {
                if (!this.isDragging) return;
                this.isDragging = false;

                const maxVelocity = 0.5;
                if (this.velocity > maxVelocity) this.velocity = maxVelocity;
                if (this.velocity < -maxVelocity) this.velocity = -maxVelocity;

                const runInertia = () => {
                    if (Math.abs(this.velocity) > 0.008) {
                        this.currentAngle += this.velocity * 16.67;
                        this.velocity *= this.friction;
                        this.render();
                        this.animationFrameId = requestAnimationFrame(runInertia);
                    } else {
                        this.snapToClosestTick();
                    }
                };
                this.animationFrameId = requestAnimationFrame(runInertia);
            }
        }

        // 4. 数据调配枢纽核心
        function updateSelectedCard() {

                window.audioRecorderState.audioUrl = null;
                window.audioRecorderState.isRecording = false;

        // 5. 纯净流利度画板渲染引擎
        function renderBoard(data) {
            const board = document.getElementById('training-board');
            board.innerHTML = '';

            data.forEach((item, sentenceIdx) => {
                const card = document.createElement('div');
                card.className = 'sentence-card';
                const flowZone = document.createElement('div');
                flowZone.className = 'interactive-flow-zone';
                let fullText = "";

                item.words.forEach((w, wordIdx) => {
                    // 1. 终极智能校验器：直接以 w.text 作为绝对正确标准，自动校验并粉碎 chunks 中的所有抽风幻觉
                    let cleanText = w.text ? w.text.trim() : "";
                    let groundTruth = cleanText.toLowerCase().replace(/[^a-z]/g, '');

                    if (w.chunks && w.chunks.length > 0) {
                        let chunkCombined = w.chunks.map(ck => ck.t).join('').toLowerCase().replace(/[^a-z]/g, '');
                        // 如果发现大模型拆分音节（chunks）拼出来的词跟标准 text 对不上，说明 chunks 抽风了，直接清空它回退到安全文本渲染
                        if (chunkCombined !== groundTruth) {
                            w.chunks = null;
                        }
                    }
                    
                    fullText += cleanText + " ";
                    const wordCol = document.createElement('div');
                    wordCol.className = 'word-column';
                    wordCol.id = `col-${sentenceIdx}-${wordIdx}`;

                    // 2. 超保守学术级连读校验（只在真正“辅音结尾+元音开头”时放行）
                    let hasLink = false;
                    if (wordIdx < item.words.length - 1) {
                        const nextW = item.words[wordIdx + 1];
                        
                        // 预先对下一个词执行相同的 chunks 抽风校验，确保对比基准绝对纯净
                        let nextTextClean = nextW.text ? nextW.text.trim() : "";
                        let nextGroundTruth = nextTextClean.toLowerCase().replace(/[^a-z]/g, '');
                        if (nextW.chunks && nextW.chunks.length > 0) {
                            let nextChunkCombined = nextW.chunks.map(ck => ck.t).join('').toLowerCase().replace(/[^a-z]/g, '');
                            if (nextChunkCombined !== nextGroundTruth) {
                                nextW.chunks = null;
                            }
                        }

                        const cText = cleanText.toLowerCase().replace(/[^a-z]/g, '');
                        const nText = nextTextClean.toLowerCase().replace(/[^a-z]/g, '');

                        if (cText && nText) {
                            // 词尾必须是真实的辅音音素结尾字母（特化加入ve和v以完美放行Level 9的love/live/give等词）
                            const isCurrConsonant = cText.endsWith('r') || cText.endsWith('k') || cText.endsWith('m') || cText.endsWith('d') || cText.endsWith('t') || cText.endsWith('n') || cText.endsWith('s') || cText.endsWith('p') || cText.endsWith('g') || cText.endsWith('ve') || cText.endsWith('v');
                            // 词首必须是绝对的元音字母开头
                            const isNextVowel = nText.startsWith('a') || nText.startsWith('e') || nText.startsWith('i') || nText.startsWith('o') || nText.startsWith('u');

                            // 核心判定微调：如果当前单词尾部包含任何标点符号（如逗号、句号），强制拦截连读符号的生成
                            const hasTrailingPunct = /[^a-zA-Z0-9']$/.test(cleanText);

                            // 物理条件严丝合缝，无标点阻断，且原始数据在这一对词中确实触发了连读意图时，才允许渲染弧线
                            if (isCurrConsonant && isNextVowel && !hasTrailingPunct && (w.link === true || nextW.link === true)) {
                                hasLink = true;
                            }
                        }
                    }

                    if (hasLink) wordCol.classList.add('link-next');

                    if (w.tip && w.tip.trim() !== "") {
                        const tipDiv = document.createElement('div');
                        tipDiv.className = 'pronunciation-tip';
                        tipDiv.innerText = w.tip;
                        wordCol.appendChild(tipDiv);
                    }

                    const wordTextSpan = document.createElement('span');
                    wordTextSpan.className = `word-text ${w.type}`;
                    wordTextSpan.id = `word-${sentenceIdx}-${wordIdx}`;
                    
                    if (w.chunks && w.chunks.length > 0) {
                        w.chunks.forEach(ck => {
                            const chunkSpan = document.createElement('span');
                            chunkSpan.className = 'letter-chunk';
                            if (ck.focus === 'primary') chunkSpan.classList.add('chunk-primary');
                            else if (ck.focus === 'secondary' || ck.focus === true) chunkSpan.classList.add('chunk-secondary');
                            chunkSpan.innerText = ck.t;
                            wordTextSpan.appendChild(chunkSpan);
                        });
                        const trailingPunct = w.text.match(/[^a-zA-Z0-9']+$/);
                        if (trailingPunct) {
                            const chunksText = w.chunks.map(ck => ck.t).join('');
                            if (!chunksText.endsWith(trailingPunct[0])) {
                                wordTextSpan.appendChild(document.createTextNode(trailingPunct[0]));
                            }
                        }
                    } else {
                        wordTextSpan.innerText = w.text;
                    }

                    wordTextSpan.onclick = (e) => {
                        e.stopPropagation();
                        if (typeof saveCardLearnedStatus === 'function') saveCardLearnedStatus(currentLevel, currentTask);
                        speakText(w.text, 0.75);
                        board.querySelectorAll('.word-text').forEach(el => el.classList.remove('active-word'));
                        wordTextSpan.classList.add('active-word');
                        updateInspector(sentenceIdx, w);
                    };

                    wordCol.appendChild(wordTextSpan);
                    flowZone.appendChild(wordCol);

                    if (w.pause === 'short' || w.pause === 'long') {
                        const pauseContainer = document.createElement('div');
                        pauseContainer.className = 'pause-container';
                        const pSpan = document.createElement('span');
                        pSpan.className = w.pause === 'short' ? 'pause-short' : 'pause-long';
                        pSpan.innerText = w.pause === 'short' ? '|' : '||';
                        pauseContainer.appendChild(pSpan);
                        flowZone.appendChild(pauseContainer);
                    }
                });

                const inspector = document.createElement('div');
                inspector.className = `inspector-panel inspector-hidden`;
                inspector.id = `inspector-${sentenceIdx}`;
                inspector.innerHTML = `
                    <div class="inspector-left">
                        <div class="inspector-word" id="ins-word-${sentenceIdx}">Word</div>
                        <div class="inspector-ipa" id="ins-ipa-${sentenceIdx}">/ipa/</div>
                        <div class="inspector-desc" id="ins-desc-${sentenceIdx}">发音细节描述</div>
                    </div>
                `;

                const transZone = document.createElement('div');
                transZone.className = 'translation-zone';
                transZone.innerText = "💡 意译参考： " + item.translation;

                // 清空并重新构建屏幕最底部的独立全局程序坞
                const dockContainer = document.getElementById('globalDockBar');
                if (dockContainer) {
                    dockContainer.innerHTML = '';

                    // 1. 🐢 慢速按钮
                    const slowBtn = document.createElement('button');
                    slowBtn.className = 'dock-btn dock-btn-slow';
                    slowBtn.innerHTML = '🐢';
                    slowBtn.onclick = () => speakText(fullText, 0.7, sentenceIdx, item.words);
                    dockContainer.appendChild(slowBtn);

                    // 2. ⚡ 常速按钮
                    const normalBtn = document.createElement('button');
                    normalBtn.className = 'dock-btn dock-btn-normal';
                    normalBtn.innerHTML = '⚡';
                    normalBtn.onclick = () => speakText(fullText, 0.95, sentenceIdx, item.words);
                    dockContainer.appendChild(normalBtn);

                    // 3. 🚀 快速按钮
                    const fastBtn = document.createElement('button');
                    fastBtn.className = 'dock-btn dock-btn-fast';
                    fastBtn.innerHTML = '🚀';
                    fastBtn.onclick = () => speakText(fullText, 1.3, sentenceIdx, item.words);
                    dockContainer.appendChild(fastBtn);

                    // 4. 注入用户指定的5个独立预留彩配方块按钮，总计8键满载程序坞排列
                    // 全局录音状态变量保底与挂载
                    if (!window.audioRecorderState) {
                        window.audioRecorderState = { mediaRecorder: null, chunks: [], audioUrl: null, isRecording: false, timer: null };
                    }

                    const extraButtons = [
                        { icon: '🎙️', action: 'record' },
                        { icon: '🎯', action: 'tasks' },
                        { icon: '📊', action: 'stats' },
                        { icon: '◁', action: 'prev' },
                        { icon: '▷', action: 'next' }
                    ];
                    extraButtons.forEach(eb => {
                        const ebBtn = document.createElement('button');
                        ebBtn.className = 'dock-btn';
                        ebBtn.innerHTML = eb.icon;
                        if (eb.action === 'tasks') {
                            ebBtn.onclick = () => showTaskPanel();
                        } else if (eb.action === 'stats') {
                            ebBtn.onclick = () => showStatsPanel();
                        } else if (eb.action === 'prev') {
                            ebBtn.onclick = () => navigateCard(-1);
                        } else if (eb.action === 'next') {
                            ebBtn.onclick = () => navigateCard(1);
                        } else if (eb.action === 'record') {
                            ebBtn.id = 'global-record-btn';
                            ebBtn.style.position = 'relative';
                            // 如果当前处于录音状态，恢复视觉红点
                            if (window.audioRecorderState.isRecording) {
                                ebBtn.innerHTML = '🟥';
                                ebBtn.style.boxShadow = '0 0 12px #ff4d4f';
                            }
                            ebBtn.onclick = () => toggleAudioRecording(ebBtn);
                        }
                        dockContainer.appendChild(ebBtn);
                    });

                    // 重新挂载或维持音频临时浮层位置
                    refreshAudioPlaybackWidget();

                    async function toggleAudioRecording(btn) {
                        const state = window.audioRecorderState;
                        if (!state.isRecording) {
                            try {
                                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                                state.chunks = [];
                                state.mediaRecorder = new MediaRecorder(stream);
                                state.mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) state.chunks.push(e.data); };
                                state.mediaRecorder.onstop = () => {
                                    const blob = new Blob(state.chunks, { type: 'audio/webm' });
                                    state.audioUrl = URL.createObjectURL(blob);
                                    refreshAudioPlaybackWidget();
                                };
                                state.mediaRecorder.start();
                                state.isRecording = true;
                                btn.innerHTML = '🟥';
                                btn.style.boxShadow = '0 0 12px #ff4d4f';
                                
                                // 自动限时 1 分钟倒计时器
                                state.timer = setTimeout(() => {
                                    if (state.isRecording) toggleAudioRecording(btn);
                                }, 60000);
                            } catch (err) {
                                alert('麦克风权限获取失败或当前设备不支持录音。');
                            }
                        } else {
                            clearTimeout(state.timer);
                            if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
                                state.mediaRecorder.stop();
                                state.mediaRecorder.stream.getTracks().forEach(track => track.stop());
                            }
                            state.isRecording = false;
                            btn.innerHTML = '🎙️';
                            btn.style.boxShadow = 'none';
                        }
                    }

                    function refreshAudioPlaybackWidget() {
                        let widget = document.getElementById('record-playback-widget');
                        if (widget) widget.remove();
                        
                        const state = window.audioRecorderState;
                        const recordBtn = document.getElementById('global-record-btn');
                        if (state && state.audioUrl && recordBtn) {
                            widget = document.createElement('div');
                            widget.id = 'record-playback-widget';
                            widget.style.cssText = 'position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); background: rgba(22, 27, 34, 0.95); border: 1px solid var(--flow-cyan); padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000;';
                            
                            const playBtn = document.createElement('button');
                            playBtn.innerHTML = '▶️';
                            playBtn.style.cssText = 'background:none; border:none; cursor:pointer; font-size:1rem; color:#fff;';
                            const audioNode = new Audio(state.audioUrl);
                            playBtn.onclick = (e) => {
                                e.stopPropagation(); // 阻止事件冒泡到录音按钮
                                if (audioNode.paused) {
                                    audioNode.play();
                                    playBtn.innerHTML = '⏸️';
                                } else {
                                    audioNode.pause();
                                    playBtn.innerHTML = '▶️';
                                }
                            };
                            audioNode.onended = () => { playBtn.innerHTML = '▶️'; };

                            const label = document.createElement('span');
                            label.innerText = '我的录音';
                            label.style.cssText = 'font-size: 0.75rem; color: #8b949e; white-space: nowrap;';

                            // 整个播放浮层点击时也阻止冒泡，彻底绝缘
                            widget.onclick = (e) => { e.stopPropagation(); };

                            widget.appendChild(playBtn);
                            widget.appendChild(label);
                            recordBtn.appendChild(widget);
                        }
                    }



                    window.getLearnedStatusMap = async () => {
                        return new Promise(res => {
                            if (!db) return res({});
                            const tx = db.transaction([STORE_NAME], 'readonly');
                            const store = tx.objectStore(STORE_NAME);
                            const map = {};
                            const keys = [];
                            for (let l = 1; l <= 100; l++) {
                                for (let t = 1; t <= 10; t++) {
                                    keys.push(`learned_L${l}_T${t}`);
                                }
                            }
                            let count = 0;
                            keys.forEach(k => {
                                const req = store.get(k);
                                req.onsuccess = () => {
                                    if (req.result) {
                                        const parts = k.replace('learned_L', '').split('_T');
                                        const lvl = parseInt(parts[0]);
                                        const tsk = parseInt(parts[1]);
                                        if (!map[lvl]) map[lvl] = {};
                                        map[lvl][tsk] = true;
                                    }
                                    count++;
                                    if (count === keys.length) res(map);
                                };
                                req.onerror = () => {
                                    count++;
                                    if (count === keys.length) res(map);
                                };
                            });
                        });
                    };

                    function showStatsPanel() {
                        let panel = document.getElementById('stats-manager-panel');
                        if (!panel) {
                            panel = document.createElement('div');
                            panel.id = 'stats-manager-panel';
                            panel.style.cssText = 'position:fixed; top:15px; left:15px; right:15px; bottom:110px; background:rgba(13,17,23,0.95); backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px); border:1px solid rgba(255,255,255,0.08); border-radius:24px; padding:24px; z-index:1000; box-shadow:0 24px 60px rgba(0,0,0,0.8); display:flex; flex-direction:column; overflow:hidden;';
                            panel.innerHTML = `
                                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px;">
                                    <div>
                                        <h3 style="font-size:1.1rem; font-weight:800; letter-spacing:1px; background:linear-gradient(45deg, #00f0ff, #00ffaa); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">CHRONOS MATRIX PROGRESS</h3>
                                        <div id="stats-hud-counter" style="font-family:'Impact', 'Arial Black', sans-serif; font-size:1.6rem; color:#ffffff; margin-top:6px; letter-spacing:1px; text-shadow:0 0 10px rgba(0,255,170,0.3); font-variant-numeric:tabular-nums;">0 / 1000 <span style="color:#00ffaa; font-size:1.1rem; font-weight:normal; margin-left:6px;">0.00%</span></div>
                                    </div>
                                    <button onclick="document.getElementById('stats-manager-panel').style.display='none'" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#fff; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem;">✕</button>
                                </div>
                                <div style="width:100%; height:4px; background:rgba(255,255,255,0.03); border-radius:2px; margin-bottom:20px; overflow:hidden;">
                                    <div id="stats-hud-progressbar" style="width:0%; height:100%; background:linear-gradient(90deg, #00f0ff, #00ffaa); transition:width 0.6s cubic-bezier(0.1, 0.8, 0.2, 1); box-shadow:0 0 8px #00ffaa;"></div>
                                </div>
                                <div id="stats-scroll-container" style="flex:1; overflow-y:auto; padding-right:4px; scrollbar-width:none;"></div>
                            `;
                            document.body.appendChild(panel);
                            panel.addEventListener('touchstart', (e) => e.stopPropagation(), {passive:true});
                            panel.addEventListener('touchmove', (e) => e.stopPropagation(), {passive:true});
                        } else {
                            panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
                        }
                        if (panel.style.display !== 'none') {
                            renderStats();
                        }
                    }

                    window.renderStats = async () => {
                        const container = document.getElementById('stats-scroll-container');
                        const hudCounter = document.getElementById('stats-hud-counter');
                        const hudBar = document.getElementById('stats-hud-progressbar');
                        if (!container) return;
                        
                        container.innerHTML = '<div style="text-align:center; padding:40px; color:#8b949e; font-size:0.9rem;">GETTING ARCHIVE DATA...</div>';
                        
                        const learnedMap = await window.getLearnedStatusMap();
                        let totalLearned = 0;
                        let html = '';
                        
                        for (let l = 1; l <= 100; l++) {
                            for (let t = 1; t <= 10; t++) {
                                if (learnedMap[l] && learnedMap[l][t]) totalLearned++;
                            }
                        }
                        
                        const ratio = ((totalLearned / 1000) * 100).toFixed(2);
                        if (hudCounter) hudCounter.innerHTML = `${totalLearned} <span style="color:rgba(255,255,255,0.4); font-size:1.1rem; font-weight:normal; font-family:-apple-system;">/ 1000</span> <span style="color:#00ffaa; font-size:1.4rem; margin-left:12px;">${ratio}%</span>`;
                        if (hudBar) hudBar.style.width = `${ratio}%`;

                        for (let l = 1; l <= 100; l++) {
                            html += `
                                <div style="display:flex; align-items:center; padding:9px 6px; border-bottom:1px solid rgba(255,255,255,0.02); font-variant-numeric: tabular-nums;">
                                    <span style="font-size:0.75rem; font-weight:700; color:rgba(255,255,255,0.3); width:65px; letter-spacing:0.5px;">LV.${String(l).padStart(3, '0')}</span>
                                    <div style="display:grid; grid-template-columns: repeat(10, 1fr); gap:5px; flex:1;">
                            `;
                            for (let t = 1; t <= 10; t++) {
                                const isLearned = learnedMap[l] && learnedMap[l][t];
                                const boxStyle = isLearned 
                                    ? 'background:#00ffaa; border-color:#00ffaa; box-shadow:0 0 8px rgba(0,255,170,0.6);' 
                                    : 'background:rgba(255,255,255,0.02); border-color:rgba(255,255,255,0.08);';
                                html += `<div onclick="leftWheel.setValue(${l}); rightWheel.setValue(${t}); document.getElementById('stats-manager-panel').style.display='none';" style="aspect-ratio:1/1; border:1px solid; border-radius:3px; cursor:pointer; transition:all 0.15s; ${boxStyle}" title="L${l}-T${t}"></div>`;
                            }
                            html += `
                                    </div>
                                </div>
                            `;
                        }
                        container.innerHTML = html;
                    };

                    function showTaskPanel() {
                        let panel = document.getElementById('task-manager-panel');
                        if (!panel) {
                            panel = document.createElement('div');
                            panel.id = 'task-manager-panel';
                            panel.style.cssText = 'position:fixed; bottom:100px; left:20px; right:20px; max-width:760px; margin:0 auto; background:rgba(22,27,34,0.95); border:1px solid #30363d; border-radius:15px; padding:20px; z-index:1000; box-shadow:0 10px 30px rgba(0,0,0,0.5);';
                            panel.innerHTML = `
                                <h3 style="margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
                                    <span style="flex:1">任务清单</span>
                                    <button onclick="toggleTaskInput()" style="background:none; border:none; color:var(--flow-cyan); cursor:pointer; font-size:1.5rem; padding:0 10px;">+</button>
                                </h3>
                                <div id="task-input-container" style="display:none; gap:8px; margin-bottom:12px;">
                                    <input type="text" id="task-inline-input" placeholder="输入新任务..." style="flex:1; background:rgba(255,255,255,0.05); border:1px solid #30363d; border-radius:6px; color:#fff; padding:6px 10px; font-size:0.9rem; outline:none;">
                                    <button onclick="submitInlineTask()" style="background:none; border:none; cursor:pointer; font-size:1.1rem;">✈️</button>
                                </div>
                                <ul id="task-list" style="list-style:none; max-height:200px; overflow-y:auto;"></ul>
                            `;
                            document.body.appendChild(panel);
                        } else {
                            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
                        }
                        renderTasks();
                    }

                    window.toggleTaskInput = () => {
                        const container = document.getElementById('task-input-container');
                        if (container) {
                            container.style.display = container.style.display === 'none' ? 'flex' : 'none';
                            if (container.style.display === 'flex') {
                                document.getElementById('task-inline-input').focus();
                            }
                        }
                    };

                    window.submitInlineTask = async () => {
                        const input = document.getElementById('task-inline-input');
                        if (!input) return;
                        const text = input.value.trim();
                        if (text) {
                            const tasks = await getTasksFromDB();
                            tasks.push(text);
                            await saveTasksToDB(tasks);
                            input.value = '';
                            document.getElementById('task-input-container').style.display = 'none';
                            renderTasks();
                        }
                    };

                    // 支持回车发送任务
                    document.addEventListener('keydown', (e) => {
                        if (e.target && e.target.id === 'task-inline-input' && e.key === 'Enter') {
                            submitInlineTask();
                        }
                    });

                    window.renderTasks = async () => {
                        const list = document.getElementById('task-list');
                        if (!list) return;
                        const tasks = await getTasksFromDB();
                        list.innerHTML = tasks.map((t, i) => `<li style="margin-bottom:8px; padding:6px 4px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center; font-size:0.9rem;"><span>${t}</span><button onclick="deleteTask(${i})" style="color:#f85149; border:none; background:none; cursor:pointer;">删除</button></li>`).join('');
                    };

                    window.deleteTask = async (idx) => {
                        const tasks = await getTasksFromDB();
                        tasks.splice(idx, 1);
                        saveTasksToDB(tasks);
                        renderTasks();
                    };

                    async function getTasksFromDB() {
                        return new Promise(res => {
                            const tx = db.transaction([STORE_NAME], 'readonly');
                            const req = tx.objectStore(STORE_NAME).get('user_tasks');
                            req.onsuccess = () => res(req.result || []);
                        });
                    }

                    function saveTasksToDB(tasks) {
                        return new Promise(res => {
                            const tx = db.transaction([STORE_NAME], 'readwrite');
                            tx.objectStore(STORE_NAME).put(tasks, 'user_tasks');
                            tx.oncomplete = () => res();
                        });
                    }
                }

                const scroller = document.createElement('div');
                scroller.className = 'card-scroll-body';
                scroller.appendChild(flowZone);
                scroller.appendChild(inspector);
                scroller.appendChild(transZone);

                card.appendChild(scroller);
                board.appendChild(card);
            });
        }

        function updateInspector(sentenceIdx, wordData) { 
            const panel = document.getElementById(`inspector-${sentenceIdx}`);
            panel.classList.remove('inspector-hidden');
            document.getElementById(`ins-word-${sentenceIdx}`).innerText = wordData.text.replace(/[^a-zA-Z']/g, "");
            document.getElementById(`ins-ipa-${sentenceIdx}`).innerText = wordData.ipa || "/暂无音标/";
            document.getElementById(`ins-desc-${sentenceIdx}`).innerText = wordData.detail || "多听标准示范，注意轻重读变化。";
        }

        function speakText(text, rate, sentenceIdx = -1, wordsArr = []) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const cleanText = text.replace(/[|]/g, '').trim();
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US'; 
                utterance.rate = rate;

                if (sentenceIdx !== -1 && wordsArr.length > 0) {
                    if (typeof saveCardLearnedStatus === 'function') saveCardLearnedStatus(currentLevel, currentTask);
                    utterance.onboundary = (event) => {
                        if (event.name === 'word') {
                            let charCount = 0;
                            for (let i = 0; i < wordsArr.length; i++) {
                                const wordStr = wordsArr[i].text;
                                if (event.charIndex >= charCount && event.charIndex < charCount + wordStr.length + 1) {
                                    const card = document.querySelectorAll('.sentence-card')[sentenceIdx];
                                    if (card) {
                                        card.querySelectorAll('.word-text').forEach(el => el.classList.remove('active-word'));
                                        const target = document.getElementById(`word-${sentenceIdx}-${i}`);
                                        if (target) {
                                            target.classList.add('active-word');
                                            updateInspector(sentenceIdx, wordsArr[i]);
                                        }
                                    }
                                    break;
                                }
                                charCount += wordStr.length + 1;
                            }
                        }
                    };
                }
                window.speechSynthesis.speak(utterance);
            } else {
                alert("当前浏览器或系统暂时无法调用语音发音引擎。");
            }
        }

        // 6. 核心底座事件绑定
        function bindEvents(instance, element) {
            const cardFrame = element.closest('.wheel-card-frame');
            element.addEventListener('mousedown', (e) => {
                if(cardFrame) cardFrame.classList.add('is-active-tuning');
                instance.start(e);
            });
            window.addEventListener('mousemove', (e) => instance.move(e));
            window.addEventListener('mouseup', () => {
                if(cardFrame) cardFrame.classList.remove('is-active-tuning');
                instance.end();
            });

            element.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if(cardFrame) cardFrame.classList.add('is-active-tuning');
                instance.start(e);
            }, { passive: false });
            window.addEventListener('touchmove', (e) => {
                if(instance.isDragging) e.preventDefault();
                instance.move(e);
            }, { passive: false });
            window.addEventListener('touchend', () => {
                if(cardFrame) cardFrame.classList.remove('is-active-tuning');
                instance.end();
            });
        }

        let leftWheel, rightWheel;

        function triggerEyeBlink() {
            document.querySelectorAll('.wheel-svg-viewport').forEach(svg => {
                svg.classList.add('is-blinking');
                setTimeout(() => svg.classList.remove('is-blinking'), 300);
            });
        }

        function navigateCard(step) {
            triggerEyeBlink();
            currentTask += step;
            if (currentTask > 10) {
                currentTask = 1;
                currentLevel++;
            } else if (currentTask < 1) {
                currentTask = 10;
                currentLevel = Math.max(1, currentLevel - 1);
            }
            leftWheel.setValue(currentLevel);
            rightWheel.setValue(currentTask);
        }

        // 专供顶部按钮调用的跨大关函数（无论当前Task是多少，点击后均重置到新大关的第1卡）
        function navigateLevel(step) {
            triggerEyeBlink();
            let targetLevel = currentLevel + step;
            if (targetLevel > 100) targetLevel = 1;
            if (targetLevel < 1) targetLevel = 100;
            
            currentLevel = targetLevel;
            currentTask = 1; // 强行重置回当前大主题的第一关
            
            leftWheel.setValue(currentLevel);
            rightWheel.setValue(currentTask);
        }

        // 7. 系统初始化入口
        window.onload = () => {
            // 初始化高精大轮盘组
            leftWheel = new TuningWheelEngine({
                container: document.getElementById('leftTouchZone'),
                tickGroup: document.getElementById('leftTickGroup'),
                textGroup: document.getElementById('leftTextGroup'),
                readout: document.getElementById('leftReadout'),
                isInfinite: true,
                totalSlots: 12,
                minVal: 1,
                maxVal: 100,
                baseVal: 1,
                themeColor: "var(--left-cyan)",
                subColor: "rgba(0, 240, 255, 0.15)",
                updateOnDrag: true,
                onValueChange: (val) => {
                    currentLevel = val;
                    updateSelectedCard();
                }
            });

            rightWheel = new TuningWheelEngine({
                container: document.getElementById('rightTouchZone'),
                tickGroup: document.getElementById('rightTickGroup'),
                textGroup: document.getElementById('rightTextGroup'),
                readout: document.getElementById('rightReadout'),
                isInfinite: true,
                totalSlots: 10,
                minVal: 1,
                maxVal: 10,
                baseVal: 1,
                themeColor: "var(--right-magenta)",
                subColor: "rgba(0, 255, 170, 0.15)",
                onValueChange: (val) => {
                    currentTask = val;
                    updateSelectedCard();
                }
            });

            bindEvents(leftWheel, document.getElementById('leftTouchZone'));
            bindEvents(rightWheel, document.getElementById('rightTouchZone'));

            // 建立本地存储沙盒连接并回放数据
            initIndexedDB(() => {
                if (db) {
                    const tx = db.transaction([STORE_NAME], "readonly");
                    const req = tx.objectStore(STORE_NAME).get("user_progress");
                    req.onsuccess = (e) => {
                        if (e.target.result) {
                            currentLevel = e.target.result.level || 1;
                            currentTask = e.target.result.task || 1;
                            leftWheel.setValue(currentLevel);
                            rightWheel.setValue(currentTask);
                        }
                        loadPackFromDB();
                    };
                    req.onerror = () => loadPackFromDB();
                } else {
                    loadPackFromDB();
                }
            });
        };
    </script>
</body>
